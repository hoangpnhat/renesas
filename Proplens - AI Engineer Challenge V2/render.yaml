services:
  - type: web
    name: property-sales-assistant
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python scripts/load_data.py
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.19
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
