[pytest]
# Test discovery patterns for co-located tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Test paths - discover tests in app directory
testpaths = tests

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info .pytest_cache node_modules

pythonpath = ./app/

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --color=yes

# Markers for different test types
markers =
    unit: Unit tests with mocked dependencies
    integration: Integration tests with real database
    slow: Slow-running tests
    external: Tests requiring external services (Databricks, ElasticSearch)
    auth: Authentication-related tests
